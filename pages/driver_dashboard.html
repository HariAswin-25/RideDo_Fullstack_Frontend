<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RideDo | Driver Dashboard</title>
  <link rel="stylesheet" href="../css/driver_dashboard.css">
</head>
<body>

<header class="navbar">
  <div class="left">
    <img src="../assets/logo.png" class="logo" alt="RideDo Logo">
    <span class="brand">RideDo</span>
  </div>

  <nav class="nav-links">
    <a href="./driver_dashboard.html" class="active">Dashboard</a>
    <a href="./driver_bookings.html">My Bookings</a>
    <a href="./driver_profile.html">Profile</a>
    <a href="../index.html" class="logout">Logout</a>
  </nav>
</header>

<section class="dashboard">
  <h2>Welcome, Driver </h2>
  <p class="subtitle">Manage your rides and earnings</p>

  <div class="stats">
    <div class="stat-card">
      <h3>Total Bookings</h3>
      <p>15</p>
    </div>

    <div class="stat-card">
      <h3>Completed Rides</h3>
      <p>12</p>
    </div>

    <div class="stat-card">
      <h3>Rating</h3>
      <p> 4.7</p>
    </div>
  </div>

  <div class="booking-section">
    <h3>Recent Bookings</h3>

    <div class="booking-card">
      <p><strong>User:</strong> Hari</p>
      <p><strong>Pickup:</strong> Anna Nagar</p>
      <p><strong>Drop:</strong> T Nagar</p>
      <p><strong>Date:</strong> 08 Jan 2026</p>
      <button class="btn accept">Accept</button>
    </div>

    <div class="booking-card">
      <p><strong>User:</strong> Arjun</p>
      <p><strong>Pickup:</strong> Velachery</p>
      <p><strong>Drop:</strong> Guindy</p>
      <p><strong>Date:</strong> 07 Jan 2026</p>
      <button class="btn completed">Completed</button>
    </div>

  </div>
</section>

</body>
</html>
