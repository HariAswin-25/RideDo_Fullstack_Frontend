<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideDo | Driver Sign Up</title>
  <link rel="stylesheet" href="../css/driver_signup.css">
</head>
<body>

<header class="navbar">
  <div class="left">
    <img src="../assets/logo.png" class="logo" alt="RideDo">
    <span class="brand">RideDo</span>
  </div>
</header>

<section class="signup-section">
  <div class="signup-card">

    <h2>Create Driver Account</h2>
    <p class="subtitle">Register once, complete details in dashboard</p>

    <form action="dashboard_redirect.html">

      <label>Profile Photo</label>
      <input type="file" accept="image/*" required>

      <label>Full Name</label>
      <input type="text" placeholder="Enter full name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter email" required>

      <label>Phone Number</label>
      <input
        type="tel"
        placeholder="10-digit mobile number"
        pattern="[0-9]{10}"
        maxlength="10"
        required
      >

      <label>Password</label>
      <input type="password" placeholder="Create password" required>

      <label>Select Role</label>
      <select required>
        <option value="">Choose role</option>
        <option value="driver">Driver</option>
        <option value="cab_driver">Cab Driver</option>
        <option value="rental_provider">Rental Provider</option>
      </select>

      <button type="submit" class="btn">Create Account</button>

      <p class="login-link">
        Already have an account?
        <a href="./driver_login.html">Login</a>
      </p>

    </form>

  </div>
</section>

</body>
</html>
